openapi: 3.1.0
info:
  title: Michelin Riding API
  version: 2.0.0
  description: >-
    BFF API for Michelin Riding web and mobile clients. Covers authentication,
    profiles, bikes, mounted tyres, activities (including GPX import and route
    display), community (feed, likes, comments), progress tracking, tyre
    recommendations driven by the Michelin catalogue, and challenges.

servers:
  - url: https://api.michelin-riding.com
    description: Production
  - url: http://localhost:8000
    description: Local development

security:
  - bearerAuth: []

tags:
  - name: Health
  - name: Auth
  - name: Profile
  - name: Activities
  - name: Strava
    description: >-
      Connect a user's Strava account via OAuth and import Strava activities into
      the local database. An imported activity is a full copy — it has its own
      local ID, shows up in the feed, counts toward progress, and its GPS route
      is available via GET /activities/{id}/route exactly like a GPX import.
      The activity is no longer dependent on Strava after import.
  - name: Community
  - name: Progress
  - name: Recommendations
  - name: Challenges

paths:

  # ─────────────────────────────────────────
  # Health
  # ─────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: Health check — pings the database
      security: []
      responses:
        '200':
          description: API and database are healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  database:
                    type: string
                    example: connected

  # ─────────────────────────────────────────
  # Auth
  # ─────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              first_name: Souhail
              last_name: Cherif
              email: souhail@example.com
              password: StrongPass123!
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and receive a JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: souhail@example.com
              password: StrongPass123!
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get the currently authenticated user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ─────────────────────────────────────────
  # Profile
  # ─────────────────────────────────────────
  /profiles/{userId}:
    get:
      tags: [Profile]
      summary: Get a user profile with computed ride stats
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Profile returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

    patch:
      tags: [Profile]
      summary: Update bio, rider type and preferences
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /profiles/{userId}/bike:
    post:
      tags: [Profile]
      summary: Add a bike to the user profile
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BikeCreateRequest'
            example:
              brand: Trek
              model: Emonda SL
              category: route
              wheel_size: 700c
      responses:
        '201':
          description: Bike added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BikeResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /profiles/{userId}/mounted-tyres:
    post:
      tags: [Profile]
      summary: Mount a tyre on one of the user's bikes
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MountedTyreCreateRequest'
            example:
              bike_id: bik_001
              brand: Michelin
              model: Power Cup 2
              size: 700x28
              mounted_at: '2026-05-01'
              estimated_lifespan_km: 4000
      responses:
        '201':
          description: Tyre mounted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MountedTyreResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  # ─────────────────────────────────────────
  # Activities
  # ─────────────────────────────────────────
  /activities:
    post:
      tags: [Activities]
      summary: Create a new activity (starts as draft)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityCreateRequest'
            example:
              user_id: usr_001
              bike_id: bik_001
              type: route
              started_at: '2026-06-16T07:15:00Z'
              weather: dry
              notes: Sortie tempo matinale.
      responses:
        '201':
          description: Activity created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

    get:
      tags: [Activities]
      summary: List activities (optionally filtered by user)
      parameters:
        - in: query
          name: user_id
          schema:
            type: string
          description: Filter by user ID
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of activities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityListResponse'

  /activities/{activityId}:
    get:
      tags: [Activities]
      summary: Get an activity by ID
      parameters:
        - $ref: '#/components/parameters/ActivityId'
      responses:
        '200':
          description: Activity returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

    patch:
      tags: [Activities]
      summary: Update notes or weather on a draft activity
      parameters:
        - $ref: '#/components/parameters/ActivityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityUpdateRequest'
      responses:
        '200':
          description: Activity updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /activities/{activityId}/complete:
    post:
      tags: [Activities]
      summary: Mark an activity as completed and record final stats
      parameters:
        - $ref: '#/components/parameters/ActivityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityCompleteRequest'
            example:
              distance_km: 42.3
              duration_seconds: 5640
              elevation_m: 312
              average_speed_kmh: 26.8
              route_polyline: '[[48.8566,2.3522],[48.857,2.353]]'
      responses:
        '200':
          description: Activity completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /activities/{activityId}/route:
    get:
      tags: [Activities]
      summary: Get GPS coordinates of an activity for map rendering
      description: >-
        Returns the route as a parsed array of [lat, lon] pairs ready to pass
        directly to Leaflet or any OpenStreetMap renderer.
        Example: `L.polyline(data.coordinates).addTo(map)`
      parameters:
        - $ref: '#/components/parameters/ActivityId'
      responses:
        '200':
          description: Route coordinates returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteResponse'
              example:
                data:
                  activity_id: act_001
                  coordinates: [[48.8566, 2.3522], [48.857, 2.353]]
                  distance_km: 42.3
                  elevation_m: 312
                  duration_seconds: 5640
                  average_speed_kmh: 26.8
                  started_at: '2026-06-16T07:15:00Z'
                  completed_at: '2026-06-16T08:49:00Z'
                meta:
                  request_id: req_route_001
                  timestamp: '2026-06-16T10:00:00Z'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /activities/import/gpx:
    post:
      tags: [Activities]
      summary: Import a GPX file as a completed activity
      description: >-
        Parses a GPX file exported from any GPS device or OpenStreetMap tool.
        Distance, duration, elevation gain, average speed and route polyline
        are all computed automatically from the track points.
      parameters:
        - in: query
          name: bike_id
          schema:
            type: string
          description: Bike to associate. Defaults to the user's first bike.
        - in: query
          name: type
          schema:
            type: string
            enum: [route, gravel, mtb, urban]
            default: route
        - in: query
          name: weather
          schema:
            type: string
            enum: [dry, wet, mixed]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: GPX file (.gpx)
              required: [file]
      responses:
        '201':
          description: Activity created from GPX
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '422':
          $ref: '#/components/responses/ValidationError'

  # ─────────────────────────────────────────
  # Community
  # ─────────────────────────────────────────
  /feed:
    get:
      tags: [Community]
      summary: Community feed of completed activities
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Feed returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedResponse'

  /activities/{activityId}/like:
    post:
      tags: [Community]
      summary: Toggle like on an activity (like if not liked, unlike if already liked)
      parameters:
        - $ref: '#/components/parameters/ActivityId'
      responses:
        '201':
          description: Like toggled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LikeResponse'
              example:
                data:
                  activity_id: act_001
                  liked: true
                  likes_count: 19
                meta:
                  request_id: req_021
                  timestamp: '2026-06-16T10:21:00Z'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /activities/{activityId}/comments:
    post:
      tags: [Community]
      summary: Post a comment on an activity
      parameters:
        - $ref: '#/components/parameters/ActivityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentCreateRequest'
            example:
              content: Super sortie, joli rythme !
      responses:
        '201':
          description: Comment posted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  # ─────────────────────────────────────────
  # Progress
  # ─────────────────────────────────────────
  /progress/summary:
    get:
      tags: [Progress]
      summary: Aggregated ride stats for the current user
      responses:
        '200':
          description: Progress summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressSummaryResponse'
              example:
                data:
                  total_km: 1240
                  total_rides: 28
                  weekly_km: 187
                  monthly_km: 524
                  badges_count: 8
                meta:
                  request_id: req_030
                  timestamp: '2026-06-16T10:25:00Z'

  /progress/weekly:
    get:
      tags: [Progress]
      summary: Distance per day for the current week (Mon–Sun)
      responses:
        '200':
          description: Weekly breakdown
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyProgressResponse'
              example:
                data:
                  days:
                    - day: mon
                      distance_km: 22
                    - day: tue
                      distance_km: 35
                    - day: wed
                      distance_km: 0
                    - day: thu
                      distance_km: 48
                    - day: fri
                      distance_km: 30
                    - day: sat
                      distance_km: 52
                    - day: sun
                      distance_km: 0
                meta:
                  request_id: req_031
                  timestamp: '2026-06-16T10:26:00Z'

  /progress/tyre-wear:
    get:
      tags: [Progress]
      summary: Estimated wear for all mounted tyres based on activity history
      responses:
        '200':
          description: Tyre wear per mounted tyre
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TyreWearListResponse'
              example:
                data:
                  items:
                    - mounted_tyre_id: mty_001
                      tyre_name: Michelin Power Cup 2
                      distance_done_km: 2340
                      estimated_lifespan_km: 4000
                      wear_percent: 58.5
                      replacement_status: monitor
                meta:
                  request_id: req_032
                  timestamp: '2026-06-16T10:27:00Z'

  # ─────────────────────────────────────────
  # Recommendations
  # ─────────────────────────────────────────
  /recommendations/tyres:
    post:
      tags: [Recommendations]
      summary: Generate a tyre recommendation from the Michelin catalogue
      description: >-
        Matches user criteria against the full Michelin bicycle tyre catalogue.
        Returns the best match plus up to 2 alternatives, each with a direct
        link to the Michelin product page.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TyreRecommendationRequest'
            example:
              bike_type: road
              riding_style: racing
              terrain: asphalt
              budget_level: competition
              tubeless: true
              e_bike: false
      responses:
        '201':
          description: Recommendation generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TyreRecommendationResponse'
              example:
                data:
                  recommendation_id: rec_001
                  primary_tyre:
                    brand: Michelin
                    model: MICHELIN POWER CUP COMPETITION LINE
                    category: road
                    segment: PREMIUM COMPETITION LINE
                    use: RACING
                    terrain_types: ASPHALT
                    sealing: TUBELESS READY
                    reasons:
                      - Gamme Premium Competition Line
                      - Usage : racing
                      - Gomme : GUM-X
                    product_url: https://www.michelin.fr/bicycle/tyres/michelin-power-cup-competition-line
                  alternatives:
                    - brand: Michelin
                      model: MICHELIN POWER ROAD TLR COMPETITION LINE
                      category: road
                      segment: PREMIUM COMPETITION LINE
                      product_url: https://www.michelin.fr/bicycle/tyres/michelin-power-road-tlr-competition-line
                meta:
                  request_id: req_040
                  timestamp: '2026-06-16T10:30:00Z'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /recommendations/tyres/{recommendationId}:
    get:
      tags: [Recommendations]
      summary: Retrieve a saved recommendation by ID
      parameters:
        - $ref: '#/components/parameters/RecommendationId'
      responses:
        '200':
          description: Recommendation returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TyreRecommendationResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  # ─────────────────────────────────────────
  # Challenges
  # ─────────────────────────────────────────
  /challenges:
    get:
      tags: [Challenges]
      summary: List all challenges with joined status for current user
      responses:
        '200':
          description: Challenges returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeListResponse'
              example:
                data:
                  items:
                    - id: chl_001
                      title: 100 km cette semaine
                      description: Atteignez 100 km avant dimanche soir.
                      goal_type: distance_km
                      goal_value: 100
                      starts_at: '2026-06-16T00:00:00Z'
                      ends_at: '2026-06-22T23:59:59Z'
                      joined: false
                meta:
                  request_id: req_050
                  timestamp: '2026-06-16T10:35:00Z'
                  total: 1

  # ─────────────────────────────────────────
  # Strava
  # ─────────────────────────────────────────
  /strava/connect:
    get:
      tags: [Strava]
      summary: Step 1 — Get the Strava OAuth URL
      description: >-
        Returns a URL the frontend must open in the user's browser or a WebView.
        The user then authorises the app on Strava. After authorising, Strava
        redirects automatically to GET /strava/callback — no further frontend
        action is needed for the token exchange.

        The `state` parameter embedded in the URL contains the user's ID so the
        backend knows which account to link when the callback fires.
      responses:
        '200':
          description: OAuth URL returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StravaConnectResponse'
              example:
                data:
                  auth_url: >-
                    https://www.strava.com/oauth/authorize?client_id=258562
                    &redirect_uri=http://localhost:8000/strava/callback
                    &response_type=code&scope=activity:read_all
                    &state=usr_7d1bdcb5&approval_prompt=auto
                  message: Open this URL in a browser to connect your Strava account.
                meta:
                  request_id: req_str_001
                  timestamp: '2026-06-16T14:43:37Z'
        '503':
          description: Strava credentials not configured on the server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /strava/callback:
    get:
      tags: [Strava]
      summary: Step 2 — OAuth callback (called automatically by Strava)
      description: >-
        **Do not call this endpoint manually.**

        Strava redirects the user's browser here after they authorise the app.
        The backend exchanges the one-time `code` for a long-lived access token
        and refresh token, then stores both on the user record identified by
        the `state` parameter (which contains the user ID set in step 1).

        After this completes the user's Strava account is permanently linked.
        The frontend can detect a successful link by checking for
        `connected: true` in the response or by storing the result of this
        redirect.
      security: []
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
          description: One-time authorisation code provided by Strava
        - in: query
          name: state
          required: true
          schema:
            type: string
          description: user_id passed through the OAuth state param
        - in: query
          name: scope
          schema:
            type: string
          description: Scopes granted by the user (e.g. activity:read_all)
      responses:
        '200':
          description: Strava account linked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StravaConnectedResponse'
              example:
                data:
                  connected: true
                  athlete_id: '163090788'
                  athlete_name: Souhail Cherif
                meta:
                  request_id: req_str_002
                  timestamp: '2026-06-16T14:49:29Z'
        '400':
          description: Invalid or expired Strava authorisation code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /strava/activities:
    get:
      tags: [Strava]
      summary: Step 3 — List the user's Strava activities
      description: >-
        Fetches the user's recent activities directly from the Strava API using
        the stored access token. Returns a preview list including the `strava_id`
        needed for the import step.

        Use `already_imported: true` to grey out activities the user has already
        brought into the app.

        The access token is refreshed automatically if it has expired — the
        frontend does not need to handle token refresh.
      parameters:
        - in: query
          name: per_page
          schema:
            type: integer
            default: 20
            maximum: 50
          description: Number of activities to return
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number for pagination
      responses:
        '200':
          description: Strava activities returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StravaActivityListResponse'
              example:
                data:
                  - strava_id: 18422693586
                    name: Course à pied matinale
                    sport_type: Run
                    distance_km: 5.1
                    duration_seconds: 1821
                    elevation_m: 3.8
                    started_at: '2026-05-08T08:31:09Z'
                    already_imported: false
                meta:
                  request_id: req_str_003
                  timestamp: '2026-06-16T14:50:00Z'
                  total: 1
        '400':
          description: Strava account not connected — call GET /strava/connect first
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Strava API unreachable or returned an error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /strava/import:
    post:
      tags: [Strava]
      summary: Step 4 — Import a Strava activity into the local database
      description: >-
        Fetches the full activity and GPS route from Strava, then saves a
        permanent copy in the local database as a completed Activity.

        **What gets copied from Strava:**
        - Activity name (stored as `notes`)
        - Distance, moving time, elevation gain, average speed
        - GPS coordinates from the Strava streams API (sampled every 10th point,
          same strategy as GPX imports)

        **After import the activity is fully local:**
        - It gets its own `id` (e.g. `act_ab6e6f62`)
        - It appears in the community feed
        - It counts toward progress stats and tyre wear
        - Its GPS route is available via `GET /activities/{id}/route` — identical
          to what a GPX import produces, so map rendering is the same
        - It persists even if the user disconnects Strava later

        The Strava activity is not modified or deleted on Strava's side.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StravaImportRequest'
            example:
              strava_activity_id: 18422693586
              type: route
              weather: dry
              bike_id: bik_001
      responses:
        '201':
          description: Activity imported and saved locally
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityResponse'
              example:
                data:
                  id: act_ab6e6f62
                  user_id: usr_7d1bdcb5
                  bike_id: bik_ab6dd4a7
                  type: route
                  status: completed
                  notes: Course à pied matinale
                  distance_km: 5.1
                  duration_seconds: 1821
                  elevation_m: 3.8
                  average_speed_kmh: 10.1
                  started_at: '2026-05-08T08:31:09'
                  completed_at: '2026-05-08T09:04:50'
                meta:
                  request_id: req_str_004
                  timestamp: '2026-06-16T14:51:28Z'
        '400':
          description: Strava not connected, or no bike on the profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Strava activity not found (wrong ID or private)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Strava API unreachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /challenges/{challengeId}/join:
    post:
      tags: [Challenges]
      summary: Join a challenge
      parameters:
        - $ref: '#/components/parameters/ChallengeId'
      responses:
        '201':
          description: Challenge joined
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeJoinResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
      example: usr_001

    ActivityId:
      name: activityId
      in: path
      required: true
      schema:
        type: string
      example: act_001

    RecommendationId:
      name: recommendationId
      in: path
      required: true
      schema:
        type: string
      example: rec_001

    ChallengeId:
      name: challengeId
      in: path
      required: true
      schema:
        type: string
      example: chl_001

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    UnauthorizedError:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    ConflictError:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    BadRequestError:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:

    Meta:
      type: object
      properties:
        request_id:
          type: string
        timestamp:
          type: string
          format: date-time
        total:
          type: integer
      required: [request_id, timestamp]

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
      required: [detail]

    # ── Strava ────────────────────────────
    StravaConnectResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            auth_url:
              type: string
              format: uri
              description: Open this URL in the user's browser or WebView
            message:
              type: string
        meta:
          $ref: '#/components/schemas/Meta'

    StravaConnectedResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            connected:
              type: boolean
            athlete_id:
              type: string
            athlete_name:
              type: string
        meta:
          $ref: '#/components/schemas/Meta'

    StravaActivityPreview:
      type: object
      properties:
        strava_id:
          type: integer
          description: Use this ID to import the activity via POST /strava/import
        name:
          type: string
        sport_type:
          type: string
          description: Activity type as reported by Strava (e.g. Ride, Run, VirtualRide)
        distance_km:
          type: number
        duration_seconds:
          type: integer
        elevation_m:
          type: number
        started_at:
          type: string
          format: date-time
        already_imported:
          type: boolean
          description: >-
            True if this Strava activity has already been imported into the local
            database. Use this to grey out or hide already-imported activities in
            the UI.
      required: [strava_id, name, sport_type, distance_km, duration_seconds, elevation_m, started_at, already_imported]

    StravaActivityListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/StravaActivityPreview'
        meta:
          $ref: '#/components/schemas/Meta'

    StravaImportRequest:
      type: object
      required: [strava_activity_id]
      properties:
        strava_activity_id:
          type: integer
          description: The Strava activity ID from GET /strava/activities
        bike_id:
          type: string
          description: Bike to associate. Defaults to the user's first bike if omitted.
        type:
          type: string
          enum: [route, gravel, mtb, urban]
          default: route
          description: Activity type to assign in the local database
        weather:
          type: string
          enum: [dry, wet, mixed]
          description: Weather conditions (optional)

    # ── Auth ──────────────────────────────
    RegisterRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required: [first_name, last_name, email, password]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    User:
      type: object
      properties:
        id:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
        level:
          type: integer
        created_at:
          type: string
          format: date-time
      required: [id, first_name, last_name, email, level, created_at]

    AuthPayload:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        access_token:
          type: string
        token_type:
          type: string
          example: bearer
      required: [user, access_token, token_type]

    AuthSuccessResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/AuthPayload'
        meta:
          $ref: '#/components/schemas/Meta'

    UserResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'
        meta:
          $ref: '#/components/schemas/Meta'

    # ── Profile ───────────────────────────
    Preferences:
      type: object
      properties:
        terrains:
          type: array
          items:
            type: string
        priorities:
          type: array
          items:
            type: string
        weather_preferences:
          type: array
          items:
            type: string

    ProfileStats:
      type: object
      properties:
        total_km:
          type: number
        total_rides:
          type: integer
        level:
          type: integer

    Profile:
      type: object
      properties:
        user_id:
          type: string
        avatar_url:
          type: string
          format: uri
        rider_type:
          type: string
          enum: [route, gravel, mtb, urban]
        bio:
          type: string
        preferences:
          $ref: '#/components/schemas/Preferences'
        stats:
          $ref: '#/components/schemas/ProfileStats'
      required: [user_id, rider_type]

    ProfileUpdateRequest:
      type: object
      properties:
        avatar_url:
          type: string
          format: uri
        rider_type:
          type: string
          enum: [route, gravel, mtb, urban]
        bio:
          type: string
        preferences:
          $ref: '#/components/schemas/Preferences'

    ProfileResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Profile'
        meta:
          $ref: '#/components/schemas/Meta'

    BikeCreateRequest:
      type: object
      properties:
        brand:
          type: string
        model:
          type: string
        category:
          type: string
          enum: [route, gravel, mtb, urban]
        wheel_size:
          type: string
      required: [brand, model, category]

    Bike:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        brand:
          type: string
        model:
          type: string
        category:
          type: string
        wheel_size:
          type: string
      required: [id, user_id, brand, model, category]

    BikeResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Bike'
        meta:
          $ref: '#/components/schemas/Meta'

    MountedTyreCreateRequest:
      type: object
      properties:
        bike_id:
          type: string
        brand:
          type: string
        model:
          type: string
        size:
          type: string
        mounted_at:
          type: string
          format: date
        estimated_lifespan_km:
          type: number
      required: [bike_id, brand, model, size, mounted_at, estimated_lifespan_km]

    MountedTyre:
      type: object
      properties:
        id:
          type: string
        bike_id:
          type: string
        brand:
          type: string
        model:
          type: string
        size:
          type: string
        mounted_at:
          type: string
          format: date
        estimated_lifespan_km:
          type: number
      required: [id, bike_id, brand, model, size, mounted_at, estimated_lifespan_km]

    MountedTyreResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/MountedTyre'
        meta:
          $ref: '#/components/schemas/Meta'

    # ── Activities ────────────────────────
    ActivityCreateRequest:
      type: object
      properties:
        user_id:
          type: string
        bike_id:
          type: string
        type:
          type: string
          enum: [route, gravel, mtb, urban]
        started_at:
          type: string
          format: date-time
        weather:
          type: string
          enum: [dry, wet, mixed]
        notes:
          type: string
      required: [user_id, bike_id, type, started_at]

    ActivityUpdateRequest:
      type: object
      properties:
        weather:
          type: string
          enum: [dry, wet, mixed]
        notes:
          type: string

    ActivityCompleteRequest:
      type: object
      properties:
        distance_km:
          type: number
        duration_seconds:
          type: integer
        elevation_m:
          type: number
        average_speed_kmh:
          type: number
        route_polyline:
          type: string
          description: JSON-encoded array of [lat, lon] pairs
      required: [distance_km, duration_seconds, elevation_m, average_speed_kmh]

    Activity:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        bike_id:
          type: string
        type:
          type: string
        status:
          type: string
          enum: [draft, in_progress, completed]
        weather:
          type: string
        notes:
          type: string
        distance_km:
          type: number
        duration_seconds:
          type: integer
        elevation_m:
          type: number
        average_speed_kmh:
          type: number
        route_polyline:
          type: string
          description: JSON-encoded array of [lat, lon] pairs
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
      required: [id, user_id, bike_id, type, status, started_at]

    ActivityResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Activity'
        meta:
          $ref: '#/components/schemas/Meta'

    ActivityListResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Activity'
        meta:
          $ref: '#/components/schemas/Meta'

    Route:
      type: object
      properties:
        activity_id:
          type: string
        coordinates:
          type: array
          items:
            type: array
            items:
              type: number
            minItems: 2
            maxItems: 2
          description: Array of [lat, lon] pairs — pass directly to Leaflet
        distance_km:
          type: number
        elevation_m:
          type: number
        duration_seconds:
          type: integer
        average_speed_kmh:
          type: number
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
      required: [activity_id, coordinates]

    RouteResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Route'
        meta:
          $ref: '#/components/schemas/Meta'

    # ── Community ─────────────────────────
    FeedUser:
      type: object
      properties:
        id:
          type: string
        display_name:
          type: string
        avatar_url:
          type: string
      required: [id, display_name]

    FeedSummary:
      type: object
