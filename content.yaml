          type: integer
        tyre_name:
          type: string

    FeedItem:
      type: object
      properties:
        id:
          type: string
        activity_id:
          type: string
        user:
          $ref: '#/components/schemas/FeedUser'
        summary:
          $ref: '#/components/schemas/FeedSummary'
        verified_michelin_review:
          type: boolean
        likes_count:
          type: integer
        comments_count:
          type: integer
        created_at:
          type: string
          format: date-time
      required: [id, activity_id, user, created_at]

    FeedResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/FeedItem'
        meta:
          $ref: '#/components/schemas/Meta'

    LikeResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            activity_id:
              type: string
            liked:
              type: boolean
            likes_count:
              type: integer
        meta:
          $ref: '#/components/schemas/Meta'

    CommentCreateRequest:
      type: object
      properties:
        content:
          type: string
      required: [content]

    Comment:
      type: object
      properties:
        id:
          type: string
        activity_id:
          type: string
        user_id:
          type: string
        content:
          type: string
        created_at:
          type: string
          format: date-time
      required: [id, activity_id, user_id, content, created_at]

    CommentResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Comment'
        meta:
          $ref: '#/components/schemas/Meta'

    # ── Progress ──────────────────────────
    ProgressSummary:
      type: object
      properties:
        total_km:
          type: number
        total_rides:
          type: integer
        weekly_km:
          type: number
        monthly_km:
          type: number
        badges_count:
          type: integer
      required: [total_km, total_rides, weekly_km, monthly_km, badges_count]

    ProgressSummaryResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ProgressSummary'
        meta:
          $ref: '#/components/schemas/Meta'

    WeeklyProgressDay:
      type: object
      properties:
        day:
          type: string
          enum: [mon, tue, wed, thu, fri, sat, sun]
        distance_km:
          type: number
      required: [day, distance_km]

    WeeklyProgressResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            days:
              type: array
              items:
                $ref: '#/components/schemas/WeeklyProgressDay'
        meta:
          $ref: '#/components/schemas/Meta'

    TyreWearItem:
      type: object
      properties:
        mounted_tyre_id:
          type: string
        tyre_name:
          type: string
        distance_done_km:
          type: number
        estimated_lifespan_km:
          type: number
        wear_percent:
          type: number
        replacement_status:
          type: string
          enum: [ok, monitor, replace_soon]
      required: [mounted_tyre_id, tyre_name, distance_done_km, estimated_lifespan_km, wear_percent, replacement_status]

    TyreWearListResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/TyreWearItem'
        meta:
          $ref: '#/components/schemas/Meta'

    # ── Recommendations ───────────────────

    # Valid combinations — front devs should use these to drive UI dropdowns:
    #
    #   bike_type │ riding_style allowed              │ terrain allowed
    #   ──────────┼───────────────────────────────────┼──────────────────────────────────
    #   road      │ racing, endurance                 │ asphalt
    #   gravel    │ endurance, all_road, touring      │ asphalt, mixed, offroad_hard
    #   mtb       │ cross_country, trail, enduro,     │ offroad_hard, offroad_mixed,
    #             │   downhill                        │   offroad_soft
    #   city      │ urban, trekking, touring          │ asphalt, mixed
    #   ebike     │ (any value matching the discipline│ asphalt, mixed, offroad_hard,
    #             │   of the e-bike)                  │   offroad_mixed
    #
    # budget_level is independent of bike_type:
    #   racing → competition → performance → access  (best to entry)
    #
    # tubeless: show as a toggle — true = Tubeless Ready, false = Tube Type
    # e_bike:   always true when bike_type = ebike; optionally true for speed-pedelecs

    TyreRecommendationRequest:
      type: object
      required: [bike_type, riding_style, terrain, budget_level, tubeless]
      properties:

        bike_type:
          type: string
          enum: [road, gravel, mtb, city, ebike]
          description: >-
            Type of bike. Drives which Michelin catalogue entries are considered.
            • road   — Road / racing bike
            • gravel — Gravel / adventure bike
            • mtb    — Mountain bike
            • city   — City / commuting / trekking bike
            • ebike  — Dedicated e-bike (available across all disciplines)
          example: road

        riding_style:
          type: string
          enum:
            - racing        # road
            - endurance     # road, gravel
            - all_road      # gravel
            - touring       # gravel, city
            - trekking      # city
            - urban         # city
            - cross_country # mtb
            - trail         # mtb
            - enduro        # mtb
            - downhill      # mtb
          description: >-
            How you ride. Maps to the "Use" field in the Michelin catalogue.
            Restrict the dropdown to the values relevant for the selected bike_type:

            road  → racing | endurance
            gravel → endurance | all_road | touring
            mtb   → cross_country | trail | enduro | downhill
            city  → urban | trekking | touring
            ebike → pick the value matching the e-bike discipline
          example: racing

        terrain:
          type: string
          enum:
            - asphalt       # road, city, ebike
            - mixed         # gravel, city, ebike
            - offroad_hard  # mtb, gravel, ebike
            - offroad_mixed # mtb
            - offroad_soft  # mtb
          description: >-
            Main riding surface. Maps to "Terrain Types" in the catalogue.
            Restrict the dropdown to the values relevant for the selected bike_type:

            road  → asphalt
            gravel → asphalt | mixed | offroad_hard
            mtb   → offroad_hard | offroad_mixed | offroad_soft
            city  → asphalt | mixed
            ebike → asphalt | mixed | offroad_hard | offroad_mixed
          example: asphalt

        budget_level:
          type: string
          enum: [racing, competition, performance, access]
          description: >-
            Price / performance segment. Independent of bike_type.
            Maps to the "Segment" field in the catalogue.
            • racing      → PREMIUM RACING LINE       (top-of-range, club/pro)
            • competition → PREMIUM COMPETITION LINE  (high performance)
            • performance → PREMIUM PERFORMANCE LINE  (mid-range)
            • access      → ACCESS LINE               (entry level)
          example: competition

        tubeless:
          type: boolean
          description: >-
            Mounting system.
            • true  — Tubeless Ready (TLR): no inner tube, lower rolling resistance.
                      Requires tubeless-compatible rims.
            • false — Tube Type: standard inner tube required.
            Show as a toggle in the UI.
          example: true

        e_bike:
          type: boolean
          default: false
          description: >-
            E-bike reinforced tyre required.
            • true  — Filters for E-BIKE READY / E-50 tyres (reinforced casing,
                      higher speed rating for motor-assisted bikes).
            • false — Standard tyres, no e-bike constraint.
            Force true whenever bike_type is "ebike".
            Can also be true for road/gravel/mtb speed-pedelecs.
          example: false

    TyreCandidate:
      type: object
      properties:
        brand:
          type: string
        model:
          type: string
        category:
          type: string
        segment:
          type: string
        use:
          type: string
        terrain_types:
          type: string
        sealing:
          type: string
        reasons:
          type: array
          items:
            type: string
        product_url:
          type: string
          format: uri
      required: [brand, model, category]

    TyreRecommendationPayload:
      type: object
      properties:
        recommendation_id:
          type: string
        primary_tyre:
          $ref: '#/components/schemas/TyreCandidate'
        alternatives:
          type: array
          items:
            $ref: '#/components/schemas/TyreCandidate'
      required: [recommendation_id, primary_tyre]

    TyreRecommendationResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/TyreRecommendationPayload'
        meta:
          $ref: '#/components/schemas/Meta'

    # ── Challenges ────────────────────────
    Challenge:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        goal_type:
          type: string
        goal_value:
          type: number
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        joined:
          type: boolean
      required: [id, title, goal_type, goal_value, starts_at, ends_at, joined]

    ChallengeListResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Challenge'
        meta:
          $ref: '#/components/schemas/Meta'

    ChallengeJoinResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            challenge_id:
              type: string
            joined:
              type: boolean
            joined_at:
              type: string
              format: date-time
        meta:
          $ref: '#/components/schemas/Meta'
