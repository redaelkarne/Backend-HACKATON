name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: appdb
          MYSQL_USER: appuser
          MYSQL_PASSWORD: apppassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prootpassword"
          --health-interval=5s
          --health-timeout=10s
          --health-retries=10
          --health-start-period=30s

    env:
      DATABASE_URL: mysql+aiomysql://appuser:apppassword@127.0.0.1:3306/appdb
      SECRET_KEY: ci-secret-key-32-chars-minimum-ok
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Start API server
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/uvicorn.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break || sleep 2
          done

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Show server logs on failure
        if: failure()
        run: cat /tmp/uvicorn.log
